{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
  <div class="max-w-md mx-auto mt-12 bg-white p-8 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold text-center text-indigo-600 mb-6">Login</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="text-{{ 'red' if category=='error' else 'green' }}-600 mb-4">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
        <input type="text" name="email" id="email" required class="mt-1 block w-full px-4 py-2 border rounded">
      </div>
      <div class="mt-4">
        <label for="senha" class="block text-sm font-medium text-gray-700">Senha</label>
        <input type="password" name="senha" id="senha" required class="mt-1 block w-full px-4 py-2 border rounded">
      </div>
      <div class="mt-6 flex gap-3 justify-center">
        <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded hover:bg-indigo-700 transition">Entrar</button>
        <a href="{{ url_for('auth.register') }}" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700 transition inline-block">Criar Cadastro</a>
      </div>
    </form>
  </div>
{% endblock %}
